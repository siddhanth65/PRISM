<style>
:root{--bg:#07090f;--s1:#0d1120;--s2:#111827;--bd:#1a2236;--ac:#00d4aa;--ac2:#4a8fff;--amber:#ffb347;--red:#ff6b6b;--txt:#dce6f5;--muted:#5a7090;--muted2:#8098b8}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}
/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0}
.hlogo{display:flex;align-items:center;gap:14px}
.hlogo-name{font-family:'DM Serif Display',serif;font-size:26px;color:var(--ac);letter-spacing:-0.5px}
.hlogo-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;line-height:1.4}
.hbadge{background:var(--ac);color:#07090f;font-size:9px;font-weight:700;padding:3px 9px;border-radius:100px;font-family:'JetBrains Mono',monospace;letter-spacing:0.05em}
.hstats{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:12px}
.dot{color:var(--ac);font-size:8px}
/* ── Layout ── */
.layout{display:grid;grid-template-columns:210px 1fr 390px;flex:1;overflow:hidden}
/* ── Sidebar ── */
.sidebar{border-right:1px solid var(--bd);overflow-y:auto;padding:12px 0}
.sid-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 16px 10px;font-family:'JetBrains Mono',monospace}
.uitem{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:2px solid transparent;transition:.15s}
.uitem:hover{background:var(--s2)}
.uitem.active{border-left-color:var(--ac);background:rgba(0,212,170,.07)}
.ava{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#07090f}
.uname{font-size:13px;font-weight:500;line-height:1.2}
.umeta{font-size:10px;color:var(--muted);margin-top:2px}
.edge-badge{font-size:8px;padding:1px 5px;border-radius:100px;font-family:'JetBrains Mono',monospace;margin-top:3px;display:inline-block}
.eb-cold{background:rgba(74,143,255,.15);color:var(--ac2)}
.eb-harsh{background:rgba(255,107,107,.15);color:var(--red)}
.eb-niche{background:rgba(255,179,71,.15);color:var(--amber)}
/* ── Center ── */
.center{overflow-y:auto;padding:20px}
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:10px}
/* Profile card */
.pcard{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:18px}
.prow{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.pname{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:4px}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0 10px}
.ptag{font-size:9px;padding:2px 7px;border-radius:100px;border:1px solid var(--bd);color:var(--muted2);font-family:'JetBrains Mono',monospace}
.pstats{display:flex;gap:18px;margin-top:8px}
.pstat-v{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ac)}
.pstat-l{font-size:9px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace}
.pstyle{display:inline-block;font-size:9px;padding:2px 8px;border-radius:100px;margin-top:6px;font-family:'JetBrains Mono',monospace;font-weight:600}
.style-generous{background:rgba(0,212,170,.12);color:var(--ac)}
.style-neutral{background:rgba(74,143,255,.12);color:var(--ac2)}
.style-harsh{background:rgba(255,107,107,.12);color:var(--red)}
.gbars{}
.grow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.glabel{font-size:10px;color:var(--muted2);width:78px;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.gtrack{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.gfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ac),#00a4d4)}
.gval{font-size:9px;color:var(--muted);width:24px;text-align:right;font-family:'JetBrains Mono',monospace}
/* Movie grid */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:4px}
.mcard{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:11px;transition:.15s}
.mcard:hover{border-color:rgba(0,212,170,.3)}
.mtitle{font-size:11.5px;font-weight:500;line-height:1.3;margin-bottom:3px}
.mgenres{font-size:9px;color:var(--muted);margin-bottom:5px;line-height:1.3}
.mstars{color:var(--amber);font-size:12px;letter-spacing:1px}

.recs{overflow-y:auto;padding:18px 14px}
.rec-intro{font-size:11px;color:var(--muted);margin-bottom:14px;font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--bd);padding-bottom:10px}
.rcard{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:9px;cursor:pointer;transition:.2s}
.rcard:hover{border-color:rgba(0,212,170,.3)}
.rcard.xp{border-color:var(--ac)}
.rhead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.rrank{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-bottom:2px}
.rtitle{font-size:13.5px;font-weight:600;line-height:1.3}
.rgenres{font-size:9px;color:var(--muted2);margin-top:2px}
.rscore-block{text-align:right;flex-shrink:0;margin-left:12px}
.rscore-v{font-family:'DM Serif Display',serif;font-size:26px;color:var(--ac);line-height:1}
.rscore-l{font-size:8px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-top:2px}
/* Score bars */
.sbars{margin-top:6px}
.srow{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.slabel{font-size:8px;font-family:'JetBrains Mono',monospace;color:var(--muted);width:38px;text-align:right;flex-shrink:0}
.strack{flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.sfill{height:100%;border-radius:2px;transition:.5s}
.sval{font-size:8px;font-family:'JetBrains Mono',monospace;color:var(--muted);width:26px}
/* Expand */
.rexpand{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.rcard.xp .rexpand{display:block}
.why-text{font-size:10.5px;color:var(--muted2);line-height:1.55;margin-bottom:8px}
.cp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cp-lbl{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted)}
.cp-track{flex:1;height:8px;background:var(--bd);border-radius:4px;overflow:hidden}
.cp-fill{height:100%;border-radius:4px}
.cp-conf{font-size:9px;font-family:'JetBrains Mono',monospace}
.fpills{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.fp{font-size:8px;padding:2px 6px;border-radius:100px;background:rgba(0,212,170,.1);color:var(--ac);font-family:'JetBrains Mono',monospace}
/* ── Pipeline footer ── */
footer{border-top:1px solid var(--bd);background:var(--s1);padding:0 20px;height:42px;display:flex;align-items:center;gap:5px;font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);flex-shrink:0;overflow-x:auto}
.pstage{padding:4px 10px;border-radius:4px;background:var(--s2);border:1px solid var(--bd);white-space:nowrap;color:var(--txt)}
.pstage.a{border-color:var(--ac);color:var(--ac);background:rgba(0,212,170,.07)}
.parr{color:var(--bd);font-size:11px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>

    rated:[{id:222,r:5},{id:127,r:5},{id:56,r:5},{id:117,r:5},{id:100,r:4},{id:12,r:4}],
    recs:[
      {id:98,p:.92,b:.89,l:.94,c:.91,why:"Silence of the Lambs — Drama/Thriller gem that Casey's genre vector demands. Having rated Fargo and L.A. Confidential highly, LightGBM's pair embedding text captures 'crime-aesthete evaluating psychological thriller' — cos similarity 0.89 with positive prototype.",feat:["pos-proto-sim:0.89","genre:Drama/Thriller","LightGBM:0.94","pair-embed-text"],cp:"VERY HIGH"},
      {id:64,p:.88,b:.85,l:.91,c:.86,why:"Shawshank Redemption — pure Drama. Casey's drama affinity (0.92) means this is a clear positive. LightGBM sees the BPR-signal from Crime lovers who consistently bridge to Drama. Genre Jaccard: 0.79 with rated set.",feat:["drama-affinity:0.92","genre-jaccard:0.79","BPR-rank:#3","CF-bridge"],cp:"HIGH CONFIDENCE"},
      {id:195,p:.84,b:.82,l:.87,c:.82,why:"Schindler's List — Drama/War. A slight stretch on War but Drama dominance makes this robust. LightGBM score 0.87 driven by the Drama/Crime users sharing this in their profile.",feat:["genre:Drama/War","war-affinity:low","LightGBM-dominant","CF-Drama-cluster"],cp:"HIGH CONFIDENCE"},
      {id:89,p:.80,b:.78,l:.83,c:.76,why:"Blade Runner — Film-Noir/Sci-Fi crossover. Casey has 0.95 Film-Noir affinity, but zero Sci-Fi history. This is the model's boldest recommendation — item novelty score 0.53. CP p-value is 0.76, reflecting genuine uncertainty on the Sci-Fi component. The model bets on Film-Noir being the dominant signal.",feat:["film-noir-affinity:0.95","novelty:0.53","CP:0.76","bold-rec"],cp:"MODERATE"},
    ]
  }
];

/* ═══════════════════════════════════════════════════════════ STATE */
let activeIdx = 0;
let xpRec = null;

/* ═══════════════════════════════════════════════════════════ HELPERS */
const stars = r => '★'.repeat(r) + '☆'.repeat(5-r);
const pct = v => Math.round(v*100)+'%';
const bcolor = s => s >= .9 ? 'var(--ac)' : s >= .8 ? '#00bcd4' : s >= .7 ? 'var(--ac2)' : 'var(--amber)';
const cpcolor = s => s >= .85 ? 'var(--ac)' : s >= .75 ? 'var(--ac2)' : s >= .65 ? 'var(--amber)' : 'var(--red)';

/* ═══════════════════════════════════════════════════════════ RENDER */
function renderSidebar(){
  document.getElementById('sb').innerHTML =
    `<div class="sid-lbl">Users</div>` +
    USERS.map((u,i)=>`
      <div class="uitem${i===activeIdx?' active':''}" onclick="select(${i})">
        <div class="ava" style="background:${u.col}">${u.name.split(' ')[0][0]}${u.name.split(' ')[1]?.[0]||''}</div>
        <div>
          <div class="uname">${u.name.split(' ')[0]}</div>
          <div class="umeta">${u.age}${u.gender} · ${u.occ}</div>
          ${u.edge?`<span class="edge-badge eb-${u.edge}">${u.edgeLabel}</span>`:''}
        </div>
      </div>`).join('');
}

function renderCenter(u){
  const genres = Object.entries(u.genres).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const styleClass = `style-${u.style}`;

  document.getElementById('ct').innerHTML = `
    <div class="sec-lbl">User Profile</div>
    <div class="pcard">
      <div class="prow">
        <div class="profile-left">
          <div class="pname">${u.name}</div>
          <div class="ptags">
            <span class="ptag">${u.age} yrs</span>
            <span class="ptag">${u.gender==='M'?'Male':'Female'}</span>
            <span class="ptag">${u.occ}</span>
            ${u.edge?`<span class="ptag" style="border-color:${u.col};color:${u.col}">${u.edgeLabel}</span>`:''}
          </div>
          <span class="pstyle ${styleClass}">${u.style.toUpperCase()} RATER</span>
          <div class="pstats">
            <div><div class="pstat-v">${u.avg.toFixed(1)}★</div><div class="pstat-l">Avg Rating</div></div>
            <div><div class="pstat-v">${u.cnt}</div><div class="pstat-l">Ratings</div></div>
            <div><div class="pstat-v">±${u.std.toFixed(2)}</div><div class="pstat-l">Std Dev</div></div>
          </div>
        </div>
        <div>
          <div class="sec-lbl" style="margin-bottom:8px">Genre Affinity Vector</div>
          <div class="gbars">
            ${genres.map(([g,v])=>`
              <div class="grow">
                <div class="glabel">${g}</div>
                <div class="gtrack"><div class="gfill" style="width:${pct(v)}"></div></div>
                <div class="gval">${pct(v)}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="sec-lbl">Rating History (${u.rated.length} shown)</div>
    <div class="mgrid">
      ${u.rated.map(({id,r})=>{const m=DB[id]||{};return`
        <div class="mcard">
          <div class="mtitle">${m.t||'Unknown'}</div>
          <div class="mgenres">${(m.g||[]).join(' · ')}</div>
          <div class="mstars">${stars(r)}</div>
        </div>`}).join('')}
    </div>`;
}

function renderRecs(u){
  document.getElementById('rc').innerHTML = `
    <div class="sec-lbl">PRISM Recommendations</div>
    <div class="rec-intro">
      α=${u.style==='generous'?'0.30':u.style==='harsh'?'0.25':'0.35'} · β=0.50 · cand_k=500 · δ=0.10
    </div>
    ${u.recs.map((r,i)=>{
      const m=DB[r.id]||{};
      const cc = cpcolor(r.c);
      const isXp = xpRec===`${u.id}-${i}`;
      return`<div class="rcard${isXp?' xp':''}" onclick="toggleRec('${u.id}-${i}')">
        <div class="rhead">
          <div>
            <div class="rrank">RANK #${i+1}</div>
            <div class="rtitle">${m.t||'Unknown'}</div>
            <div class="rgenres">${(m.g||[]).join(' · ')}</div>
          </div>
          <div class="rscore-block">
            <div class="rscore-v">${r.p.toFixed(2)}</div>
            <div class="rscore-l">PRISM SCORE</div>
          </div>
        </div>
        <div class="sbars">
          ${[['BPR',r.b,'#00bcd4'],['LightGBM',r.l,'var(--ac)'],['CP p-val',r.c,cc]].map(([lbl,v,col])=>`
            <div class="srow">
              <div class="slabel">${lbl}</div>
              <div class="strack"><div class="sfill" style="width:${pct(v)};background:${col}"></div></div>
              <div class="sval">${v.toFixed(2)}</div>
            </div>`).join('')}
        </div>
        <div class="rexpand">
          <div class="why-text">${r.why}</div>
          <div class="cp-row">
            <div class="cp-lbl">CP Confidence</div>
            <div class="cp-track"><div class="cp-fill" style="width:${pct(r.c)};background:${cc}"></div></div>
            <div class="cp-conf" style="color:${cc}">${r.cp}</div>
          </div>
          <div class="fpills">${r.feat.map(f=>`<span class="fp">${f}</span>`).join('')}</div>
        </div>
      </div>`;}).join('')}`;
}

function renderPipeline(){
  const stages=[
    ['Stage 1','BPR-MF + SVD',true],
    ['→','',''],
    ['Stage 2','Profiles',true],
    ['→','',''],
    ['Stage 3','Embeddings',true],
    ['→','',''],
    ['Stage 4','Features (36-dim)',true],
    ['→','',''],
    ['Stage 5','HR & NDCG',true],
    ['→','',''],
    ['Stage 6','OOF LightGBM',true],
    ['→','',''],
    ['Stage 7','Conformal CP',true],
  ];
  document.getElementById('ft').innerHTML = stages.map(([s,l,a])=>
    s==='→'?`<span class="parr">→</span>`:
    `<span class="pstage${a?' a':''}">${s}: ${l}</span>`
  ).join('');
}

function select(i){
  activeIdx=i; xpRec=null;
  renderSidebar();
  renderCenter(USERS[i]);
  renderRecs(USERS[i]);
}

function toggleRec(key){
  xpRec = xpRec===key?null:key;
  renderRecs(USERS[activeIdx]);
}

/* ═══════════════════════════════════════════════════════════ INIT */
renderSidebar();
renderCenter(USERS[0]);
renderRecs(USERS[0]);
renderPipeline();
</script>
</body>
</html>
